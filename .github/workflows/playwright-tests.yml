name: Playwright Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test automation repository
        uses: actions/checkout@v4

      - name: Checkout WDE app repository
        uses: actions/checkout@v4
        with:
          repository: Gabriel-Leao51/wde
          path: wde-app

      - name: Create .env for the WDE app stack
        run: |
          cat <<EOF > wde-app/.env
          MONGODB_URI=mongodb://mongo:27017
          STRIPE_KEY=sk_test_ci_placeholder
          APP_URL=http://localhost:3000
          PORT=3000
          EOF

      - name: Start WDE app stack (Docker Compose)
        working-directory: wde-app
        run: docker compose up -d --build

      - name: Wait for WDE app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/products > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          docker compose -f wde-app/docker-compose.yml logs
          exit 1

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Playwright tests (core suite)
        env:
          WDE_BASE_URL: http://localhost:3000
        run: >
          uv run pytest
          steps/test_admin_login_steps.py
          steps/test_security_steps.py
          steps/test_manage_product_steps.py
        # Note: manage_orders.feature and purchase_flow.feature are intentionally excluded
        # from CI, same rationale as the original Cypress pipeline: they create persistent
        # orders in the database on every run.

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-execution-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop WDE app stack
        if: always()
        working-directory: wde-app
        run: docker compose down -v
